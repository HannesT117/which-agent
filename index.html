<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Which AI Coding Agent?</title>
  <meta name="description" content="Answer a few questions to find the right AI coding tool for your workflow." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="site-header">
  <h1>Which AI Coding Agent?</h1>
  <p>Answer a few questions to find the right tool for your workflow.</p>
</header>

<main>
  <nav id="breadcrumb" aria-label="Choices made so far"></nav>

  <section id="quiz">
    <div id="card" class="card" role="region" aria-live="polite" aria-atomic="true">
      <p style="color:var(--text-dim);font-size:.9rem">Loading…</p>
    </div>
  </section>

  <section id="explore" hidden aria-label="Explore all decision paths">
    <h2>All Paths</h2>
    <p>Your path is highlighted. Green = reached, blue = chosen answers.</p>
    <div class="tree" role="tree"></div>
  </section>
</main>

<footer>
  <div class="legend" aria-label="Legend">
    <span class="legend-item"><span class="legend-dot dot-oss"></span>Open source / free</span>
    <span class="legend-item"><span class="legend-dot dot-closed"></span>Closed / API-based</span>
    <span class="legend-item"><span class="legend-dot dot-commercial"></span>Commercial IDE</span>
  </div>
  <span class="footer-credit">which-agent · data in flow-data.json</span>
</footer>

<script>
(function () {
  const S = { data: null, visited: new Set(), path: [], chosen: new Set() };

  async function init() {
    const card = document.getElementById('card');
    try {
      const res = await fetch('flow-data.json');
      if (!res.ok) throw new Error(res.statusText);
      S.data = await res.json();
      go('START', null);
    } catch (e) {
      card.innerHTML = `<p class="error">
        ⚠️ Could not load <code>flow-data.json</code>.<br>
        Serve via HTTP: <code>python -m http.server</code> then open
        <code>http://localhost:8000</code>
      </p>`;
    }
  }

  function go(id, label) {
    if (label) { S.path.push(label); S.chosen.add(id); }
    S.visited.add(id);
    renderBreadcrumb();
    renderCard(id);
  }
  window.go = go;

  function renderBreadcrumb() {
    document.getElementById('breadcrumb').innerHTML =
      S.path.map(l => `<span class="crumb" title="${l}">${l}</span>`).join('<span class="sep" aria-hidden="true">›</span>');
  }

  function renderCard(id) {
    const n = S.data.nodes[id];
    const card = document.getElementById('card');
    card.className = 'card';
    void card.offsetWidth; // trigger reflow so animation restarts
    card.innerHTML = n.type === 'question' ? questionHTML(n) : resultHTML(n, id);
    card.className = 'card' + (n.type === 'result' ? ` result-${n.category}` : '') + ' in';
    card.setAttribute('aria-label', n.type === 'question' ? n.text : n.name);
  }

  function questionHTML(n) {
    const opts = n.options.map(o =>
      `<button class="option" onclick="go('${o.next}',${JSON.stringify(o.label)})">${o.label}</button>`
    ).join('');
    return `
      <p class="card-eyebrow">Question</p>
      <h2 class="card-title">${n.text}</h2>
      ${n.subtitle ? `<p class="card-sub">${n.subtitle}</p>` : ''}
      <div class="options" role="list">${opts}</div>`;
  }

  function resultHTML(n) {
    const feats = n.features.map(f => `<li>${f}</li>`).join('');
    const tagz  = n.tags.map(t => `<span class="tag tag-${n.category}">${t}</span>`).join('');
    return `
      <p class="card-eyebrow cat-${n.category}">${n.category}</p>
      <div class="result-head">
        <span class="result-icon" aria-hidden="true">${n.icon}</span>
        <div>
          <h2 class="card-title">${n.name}</h2>
          <p class="card-sub">${n.tagline}</p>
        </div>
      </div>
      <p class="result-desc">${n.description}</p>
      <ul class="features" aria-label="Key features">${feats}</ul>
      <div class="tags" aria-label="Tags">${tagz}</div>
      <div class="result-actions">
        <button class="btn-ghost" onclick="reset()">↩ Start over</button>
        <button class="btn-ghost" onclick="showExplore()">🗺 Explore all paths</button>
      </div>`;
  }

  function reset() {
    S.visited.clear(); S.path = []; S.chosen.clear();
    const sec = document.getElementById('explore');
    sec.hidden = true;
    sec.querySelector('.tree').innerHTML = '';
    go('START', null);
  }
  window.reset = reset;

  function showExplore() {
    const sec  = document.getElementById('explore');
    const tree = sec.querySelector('.tree');
    sec.hidden = false;
    if (!tree.innerHTML) tree.innerHTML = buildTree('START');
    S.visited.forEach(id =>
      tree.querySelectorAll(`[data-node="${id}"]`).forEach(el => el.classList.add('visited'))
    );
    S.chosen.forEach(id =>
      tree.querySelectorAll(`[data-next="${id}"]`).forEach(el => el.classList.add('chosen'))
    );
    sec.scrollIntoView({ behavior: 'smooth' });
  }
  window.showExplore = showExplore;

  function buildTree(id) {
    const n = S.data.nodes[id];
    if (!n) return '';
    if (n.type === 'result') {
      return `<div class="tree-leaf cat-${n.category}" data-node="${id}">${n.icon} <strong>${n.name}</strong></div>`;
    }
    const branches = n.options.map(o => `
      <div class="branch">
        <span class="branch-label" data-next="${o.next}">${o.label}</span>
        ${buildTree(o.next)}
      </div>`).join('');
    return `<details open data-node="${id}">
      <summary>${n.text}</summary>
      <div class="branches">${branches}</div>
    </details>`;
  }

  document.addEventListener('DOMContentLoaded', init);
})();
</script>
</body>
</html>
